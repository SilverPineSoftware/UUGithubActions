name: UU Android Publish Snapshot
permissions:
  contents: read

on:
  workflow_call:
    inputs:
      module_name:
        description: 'Gradle module name'
        required: false
        type: string
        default: 'library'
      module_folder:
        description: 'Gradle module folder'
        required: false
        type: string
        default: '.'
      build_suffix:
        description: 'Build Suffix'
        required: false
        type: string
        default: ''
    secrets:
      READ_PACKAGES_PAT:
        description: 'PAT with read:packages for SilverpineSoftware GitHub Packages (Gradle resolves plugins before publish).'
        required: false
      MAVEN_CENTRAL_NEXUS_URL:
        required: true
      MAVEN_CENTRAL_SNAPSHOT_URL:
        required: true
      OSSRH_USERNAME:
        required: true
      OSSRH_PASSWORD:
        required: true
      SIGNING_KEY_ID:
        required: true
      SIGNING_PASSWORD:
        required: true
      SIGNING_KEY:
        required: true
      SONATYPE_STAGING_PROFILE_ID:
        required: true

jobs:

  publish-snapshot:
    name: Publish Snapshot
    runs-on: macos-latest
    env:
      GPR_TOKEN: ${{ secrets.READ_PACKAGES_PAT || github.token }}
    steps:
      - name: Wire org variables into Gradle project properties
        uses: SilverPineSoftware/UUGithubActions/.github/actions/uu-android-load-environment-vars@main
        with:
          uu_kotlin_build: ${{ vars.UU_KOTLIN_BUILD }}
          uu_android_min_sdk: ${{ vars.UU_ANDROID_MIN_SDK }}
          uu_android_target_sdk: ${{ vars.UU_ANDROID_TARGET_SDK }}
          uu_java_version: ${{ vars.UU_JAVA_VERSION }}

      - name: Publish Snapshot
        uses: SilverPineSoftware/UUGithubActions/.github/actions/uu-android-publish-snapshot@main
        with:
          module_name: ${{ inputs.module_name }}
          module_folder: ${{ inputs.module_folder }}
          build_suffix: ${{ inputs.build_suffix }}
          java_distribution: ${{ vars.UU_JAVA_DISTRIBUTION }}
          java_version: ${{ vars.UU_JAVA_VERSION }}
          maven_central_nexus_url: ${{ secrets.MAVEN_CENTRAL_NEXUS_URL }}
          maven_central_snapshot_url: ${{ secrets.MAVEN_CENTRAL_SNAPSHOT_URL }}
          ossrh_username: ${{ secrets.OSSRH_USERNAME }}
          ossrh_password: ${{ secrets.OSSRH_PASSWORD }}
          signing_key_id: ${{ secrets.SIGNING_KEY_ID }}
          signing_password: ${{ secrets.SIGNING_PASSWORD }}
          signing_key: ${{ secrets.SIGNING_KEY }}
          sonatype_staging_profile_id: ${{ secrets.SONATYPE_STAGING_PROFILE_ID }}