name: UU Create Release
permissions:
  contents: write

on:
  workflow_call:
    inputs:
      artifacts_to_upload:
        description: 'List of artifact names to upload to release (JSON array)'
        required: false
        type: string
        default: '["test-results", "build-artifacts"]'
      release_notes_path:
        description: 'Relative path to release notes markdown in the repository root (used when the file exists)'
        required: false
        type: string
        default: 'release_notes.md'
    secrets:
      UU_GITHUB_TOKEN: # needs different name that GITHUB_TOKEN
        required: true
  
jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for release notes
        id: release_notes
        run: |
          NOTES_PATH="${{ inputs.release_notes_path }}"
          if [ -f "$NOTES_PATH" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "path=$NOTES_PATH" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Create Release
        if: steps.release_notes.outputs.found == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body_path: ${{ steps.release_notes.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.UU_GITHUB_TOKEN }}

      - name: Create Release
        if: steps.release_notes.outputs.found != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.UU_GITHUB_TOKEN }}

  upload-release-artifacts:
    needs: create-release
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Wait for GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.UU_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          MAX_ATTEMPTS=30
          SLEEP_SECONDS=5

          echo "Waiting for release tag '$TAG' in $REPO to be visible to the API..."

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
              echo "Release '$TAG' is available (attempt $attempt/$MAX_ATTEMPTS)"
              gh release view "$TAG" --repo "$REPO"
              exit 0
            fi

            echo "Release '$TAG' not found yet (attempt $attempt/$MAX_ATTEMPTS); retrying in ${SLEEP_SECONDS}s..."
            sleep "$SLEEP_SECONDS"
          done

          echo "Timed out after $((MAX_ATTEMPTS * SLEEP_SECONDS))s waiting for release '$TAG' in $REPO" >&2
          exit 1

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true

      - name: Upload all artifacts to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.UU_GITHUB_TOKEN }}
          ARTIFACTS_TO_UPLOAD: ${{ inputs.artifacts_to_upload }}
          RELEASE_TAG: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Parse the JSON array of artifact names into a space-separated list
          ARTIFACTS=$(echo "$ARTIFACTS_TO_UPLOAD" | jq -r '.[]' | tr '\n' ' ')
          
          # Function to check if artifact name contains any fragment from the list
          should_upload() {
            local artifact_name=$1
            for allowed_fragment in $ARTIFACTS; do
              if [[ "$artifact_name" == *"$allowed_fragment"* ]]; then
                return 0
              fi
            done
            return 1
          }
          
          # Upload matching downloaded artifacts to the release
          for artifact_dir in */; do
            if [ -d "$artifact_dir" ]; then
              artifact_name="${artifact_dir%/}"
              if should_upload "$artifact_name"; then
                echo "Uploading artifact directory: $artifact_name"
                # Create a zip file from the artifact directory
                zip -r "${artifact_name}.zip" "$artifact_dir"
                # Upload to release
                gh release upload "$RELEASE_TAG" "${artifact_name}.zip" --repo "$GITHUB_REPOSITORY" --clobber
              else
                echo "Skipping artifact directory: $artifact_name (not in upload list)"
              fi
            fi
          done
          
          # Also upload matching zip files that might already exist
          for zip_file in *.zip; do
            if [ -f "$zip_file" ]; then
              artifact_name="${zip_file%.zip}"
              if should_upload "$artifact_name"; then
                echo "Uploading zip file: $zip_file"
                gh release upload "$RELEASE_TAG" "$zip_file" --repo "$GITHUB_REPOSITORY" --clobber
              else
                echo "Skipping zip file: $zip_file (not in upload list)"
              fi
            fi
          done
