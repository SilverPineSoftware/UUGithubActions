name: Create Release Tag

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0). If not specified, uses version from gradle.properties'
        required: false
        type: string
      gradle_properties_path:
        description: 'Optional folder path where gradle.properties exists. Defaults to root if empty'
        required: false
        type: string

jobs:
  create-tag:
    name: Create Release Tag
    runs-on: ubuntu-latest
    steps:
      # Local composite actions must exist on disk before `uses: ./.github/actions/...` is resolved.
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create Release Tag
        id: create-tag
        uses: ./.github/actions/uu-create-release-tag
        with:
          version: ${{ inputs.version }}
          gradle_properties_path: ${{ inputs.gradle_properties_path }}
          release_pat: ${{ secrets.RELEASE_PAT }}