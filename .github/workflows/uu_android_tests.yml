name: UU Android Tests
permissions:
  contents: read
 
on:
  workflow_call:
    secrets:
      READ_PACKAGES_PAT:
        description: 'PAT with read:packages for SilverpineSoftware GitHub Packages. Pass caller repo secret.'
        required: false
    inputs:
      runner:
        description: 'Runner environment'
        required: false
        type: string
        default: 'ubuntu-latest'
      module_name:
        description: 'Gradle module name'
        required: false
        type: string
        default: 'app'
      module_folder:
        description: 'Gradle module folder'
        required: false
        type: string
        default: '.'
      java_distribution:
        description: 'Java distribution'
        required: false
        type: string
      java_version:
        description: 'Java version'
        required: false
        type: string
      build_suffix:
        description: 'Build suffix for versioning'
        required: false
        type: string
        
jobs:
  tests:
    name: Run Unit Tests
    runs-on: ${{ inputs.runner }}
    env:
      # Do not override GITHUB_TOKEN; Gradle reads GPR_TOKEN in settings.gradle.kts (UUKotlinCore).
      GPR_TOKEN: ${{ secrets.READ_PACKAGES_PAT || github.token }}
    steps:
      - name: Run Tests
        uses: SilverPineSoftware/UUGithubActions/.github/actions/uu-android-tests@main
        with:
          module_name: ${{ inputs.module_name }}
          module_folder: ${{ inputs.module_folder }}
          build_suffix: ${{ inputs.build_suffix || github.run_number }}
          java_distribution: ${{ inputs.java_distribution || vars.UU_JAVA_DISTRIBUTION }}
          java_version: ${{ inputs.java_version || vars.UU_JAVA_VERSION }}

