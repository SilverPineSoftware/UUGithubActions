name: 'UU Android Publish Release'
description: 'Publish release to Maven Central'

inputs:
  module_name:
    description: 'Gradle module name'
    required: false
    default: 'app'
  module_folder:
    description: 'Optional relative path to module source folder.'
    required: false
    default: '.'
  java_distribution:
    description: 'Java distribution'
    required: true
  java_version:
    description: 'Java version'
    required: true
  maven_central_nexus_url:
    description: 'Maven Central Nexus URL'
    required: true
  maven_central_snapshot_url:
    description: 'Maven Central Snapshot URL'
    required: true
  ossrh_username:
    description: 'OSSRH username'
    required: true
  ossrh_password:
    description: 'OSSRH password'
    required: true
  signing_key_id:
    description: 'Signing key ID'
    required: true
  signing_password:
    description: 'Signing password'
    required: true
  signing_key:
    description: 'Signing key'
    required: true
  sonatype_staging_profile_id:
    description: 'Sonatype staging profile ID'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Prepare Build
      id: prepare
      uses: SilverPineSoftware/UUGithubActions/.github/actions/uu-android-build-prepare@main
      with:
        module_name: ${{ inputs.module_name }}
        module_folder: ${{ inputs.module_folder }}
        java_distribution: ${{ inputs.java_distribution }}
        java_version: ${{ inputs.java_version }}

    - name: Publish to Maven Central
      run: ./gradlew publishReleasePublicationToSonatypeRepository --max-workers 1 closeAndReleaseSonatypeStagingRepository -PbuildSnapshot=false
      env:
        MAVEN_CENTRAL_NEXUS_URL: ${{ inputs.maven_central_nexus_url }}
        MAVEN_CENTRAL_SNAPSHOT_URL: ${{ inputs.maven_central_snapshot_url }}
        OSSRH_USERNAME: ${{ inputs.ossrh_username }}
        OSSRH_PASSWORD: ${{ inputs.ossrh_password }}
        SIGNING_KEY_ID: ${{ inputs.signing_key_id }}
        SIGNING_PASSWORD: ${{ inputs.signing_password }}
        SIGNING_KEY: ${{ inputs.signing_key }}
        SONATYPE_STAGING_PROFILE_ID: ${{ inputs.sonatype_staging_profile_id }}
      shell: bash

    - name: Write release publish summary
      if: success()
      run: |
        set -euo pipefail

        if [ -n "${{ inputs.module_folder }}" ]; then
          cd "${{ inputs.module_folder }}"
        fi

        VERSION="${{ steps.prepare.outputs.version }}"
        PROPS_FILE="${{ inputs.module_name }}/gradle.properties"
        ARTIFACT_ID=$(grep "^uu_publish_artifact_id=" "$PROPS_FILE" | cut -d'=' -f2-)
        GROUP_ID="com.silverpine.uu"
        GROUP_PATH="${GROUP_ID//.//}"
        MAVEN_RELEASE_URL="https://repo1.maven.org/maven2/${GROUP_PATH}/${ARTIFACT_ID}/${VERSION}/"
        CENTRAL_PORTAL_URL="https://central.sonatype.com/artifact/${GROUP_ID}/${ARTIFACT_ID}/${VERSION}"

        {
          echo "### Release published"
          echo ""
          echo "Release artifacts were submitted to Maven Central. The links below may take some time to become available after Sonatype sync completes."
          echo ""
          echo "| | |"
          echo "|---|---|"
          echo "| **Version** | \`${VERSION}\` |"
          echo "| **Coordinates** | \`${GROUP_ID}:${ARTIFACT_ID}:${VERSION}\` |"
          echo "| **Maven Central (repo)** | [repo1.maven.org](${MAVEN_RELEASE_URL}) |"
          echo "| **Maven Central (portal)** | [central.sonatype.com](${CENTRAL_PORTAL_URL}) |"
        } >> "$GITHUB_STEP_SUMMARY"
      shell: bash

    - name: Extract repo name
      id: repo-name
      run: |
        REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
        echo "name=$REPO_NAME" >> $GITHUB_OUTPUT
      shell: bash

    # Captures build outputs (AARs, POMs, sources, signatures) for every
    # subproject Gradle assembled while publishing. For multi-module repos
    # (e.g. UUKotlinTest with library + library_instrumented) this uploads
    # all of them. The glob silently skips subprojects that didn't produce
    # outputs (apps, buildSrc, etc.).
    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.repo-name.outputs.name }}-publish-artifacts-${{ steps.prepare.outputs.version }}
        path: ${{ inputs.module_folder }}/*/build/outputs
        if-no-files-found: warn
